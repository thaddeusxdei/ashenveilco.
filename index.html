<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ashen Veil Co.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
  /* ... (Keep all your existing CSS) ... */
  
  /* ADMIN CONTROLS */
  #adminControls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10000;
  }

  .admin-login-btn, .admin-logout-btn {
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .admin-login-btn:hover {
    background: var(--accent);
  }

  .admin-logout-btn:hover {
    background: #c8a882;
  }

  .delete-review-btn {
    background: #4a2a2a;
    color: #ff6b6b;
    border: 1px solid #6a3a3a;
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Mono', monospace;
  }

  .delete-review-btn:hover {
    background: #6a3a3a;
    border-color: #ff6b6b;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div id="adminControls"></div>

<!-- ... (Keep all your existing HTML until the REVIEWS section) ... -->

  <!-- ═══ REVIEWS ═══ -->
  <div class="section" id="reviews">
    <div class="section-label">Client Reviews</div>

    <div class="review-form-wrap">
      <h3>Leave a Review</h3>
      <div class="form-row">
        <label>Your Name / Handle</label>
        <input type="text" id="rev-name" placeholder="e.g. traveler_xyz" maxlength="40"/>
      </div>
      <div class="form-row">
        <label>Service Availed</label>
        <select id="rev-service">
          <option value="">— Select service —</option>
          <option>Spiral Abyss</option>
          <option>Resin Farming</option>
          <option>Character Building</option>
          <option>Events (Mini)</option>
          <option>Events (Major)</option>
          <option>Exploration</option>
          <option>Quests</option>
          <option>Primogems Farming</option>
          <option>Multiple Services</option>
        </select>
      </div>
      <div class="form-row">
        <label>Rating</label>
        <div class="stars-input" id="starInput">
          <button class="star-btn" data-val="1" onclick="setRating(1)">★</button>
          <button class="star-btn" data-val="2" onclick="setRating(2)">★</button>
          <button class="star-btn" data-val="3" onclick="setRating(3)">★</button>
          <button class="star-btn" data-val="4" onclick="setRating(4)">★</button>
          <button class="star-btn" data-val="5" onclick="setRating(5)">★</button>
        </div>
      </div>
      <div class="form-row">
        <label>Your Review</label>
        <textarea id="rev-text" rows="3" placeholder="Share your experience..." maxlength="300"></textarea>
      </div>
      <button class="submit-btn" onclick="submitReview()">Submit Review</button>
      <div id="rev-msg" style="margin-top:10px;font-size:11px;color:var(--grey);letter-spacing:0.08em;"></div>
    </div>

    <div class="reviews-list" id="reviewsList">
      <div class="no-reviews" id="noReviews">
        No reviews yet. Be the first to leave one above. ✦
      </div>
    </div>
  </div>

<!-- ... (Keep rest of your HTML) ... -->

<script src="firebase-config.js" type="module"></script>
<script src="reviews-manager.js" type="module"></script>
<script>
  // Your existing cursor, ash particles, and tab scripts...
  
  // CURSOR
  const cursor = document.getElementById('cursor');
  const ring = document.getElementById('cursor-ring');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    ring.style.left = e.clientX + 'px';
    ring.style.top = e.clientY + 'px';
  });

  // ASH PARTICLES
  const ashContainer = document.getElementById('ashParticles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'ash';
    p.style.left = Math.random() * 100 + '%';
    p.style.width = p.style.height = (Math.random() * 2 + 1) + 'px';
    p.style.animationDuration = (Math.random() * 3 + 2) + 's';
    p.style.animationDelay = (Math.random() * 4) + 's';
    p.style.opacity = Math.random() * 0.5;
    ashContainer.appendChild(p);
  }

  // TABS
  function showSection(id, el) {
    event.preventDefault();
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.navtabs a').forEach(a => a.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  }

  // FAQ
  function toggleFaq(el) {
    const item = el.closest('.faq-item');
    item.classList.toggle('open');
  }
</script>
</body>
</html>
